# ===============================
# = DataSource Config (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/mentorlink_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Mentorlink@!003
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
#app.jwt.secret=mysupersecretkeythatismorethan32chars long1234
app.jwt.expiration-ms=3600000
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# = Flyway (DB Migrations) - disabled when using ddl-auto=update
# ===============================
spring.flyway.enabled=false

# ===============================
# = Server
# ===============================
server.port=8080


spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:Ov23liwGsMkhykJmEDbn}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:001df8356955b370a422fa58a3f80d15400ec3af}
spring.security.oauth2.client.registration.github.scope=user:email
spring.security.oauth2.client.registration.github.user-name-attribute=id

# College email/domain restriction (works with GitHub email too)
app.oauth.allowed-domain=${COLLEGE_EMAIL_DOMAIN:*}

# ===============================
# = Email (for notifications)
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
