# ===============================
# = DataSource Config (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/mentorlink_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Mentorlink@!003
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
#app.jwt.secret=mysupersecretkeythatismorethan32chars long1234
app.jwt.expiration-ms=3600000
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# = Flyway (DB Migrations) - disabled when using ddl-auto=update
# ===============================
spring.flyway.enabled=false

# ===============================
# = Server
# ===============================
server.port=8080


# ===============================
# = JWT
# ===============================
app.jwt.secret=${JWT_SECRET:change-this-to-a-very-long-secret-at-least-32-chars}

# ===============================
# = Email (for notifications)
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:mentorlink.project003@gmail.com}
spring.mail.password=${MAIL_PASSWORD:Mentorlink@!003}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
